name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v1.0.22). Leave empty to create the next patch tag."
        required: false
        type: string
  push:
    branches:
      - main
    paths-ignore:
      - ".goreleaser.yaml"
      - ".goreleaser.*.yaml"
      - ".github/workflows/repair-release.yml"
      - ".github/workflows/release.yml"

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.resolve_version.outputs.new_version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve tag to publish
      id: resolve_version
      env:
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail

        # Always fetch tags from remote.
        git fetch --tags

        if [ -n "${INPUT_TAG:-}" ]; then
          tag="$INPUT_TAG"
          if [[ "$tag" != v* ]]; then
            tag="v$tag"
          fi
          if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag not found: ${tag}" >&2
            exit 1
          fi
          echo "Using existing tag: $tag"
          echo "new_version=$tag" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        latest_tag="$(git describe --tags --abbrev=0 --match 'v*' || true)"
        if [ -z "$latest_tag" ]; then
          latest_tag="v0.0.0"
        fi
        echo "Latest tag: $latest_tag"

        version_without_v="${latest_tag#v}"
        IFS='.' read -r -a version_parts <<< "$version_without_v"
        major="${version_parts[0]}"
        minor="${version_parts[1]}"
        patch="${version_parts[2]}"

        new_patch=$((patch + 1))
        new_version="v$major.$minor.$new_patch"
        echo "New version: $new_version"
        echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

    - name: Create and push new tag
      if: ${{ github.event_name != 'workflow_dispatch' || inputs.tag == '' }}
      env:
        GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
      run: |
        new_version=${{ steps.resolve_version.outputs.new_version }}

        # Create a new tag
        git tag "$new_version"
        
        # Push the new tag to the remote repository
        git push origin "$new_version"

  release_linux:
    needs: tag
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    environment: goreleaser
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_version }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            build-essential \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Build coinset-inspect staticlib
        run: |
          cargo build --release -p coinset-ffi --target x86_64-unknown-linux-gnu
          mkdir -p cgo-lib/x86_64-unknown-linux-gnu
          cp "target/x86_64-unknown-linux-gnu/release/libcoinset.a" cgo-lib/x86_64-unknown-linux-gnu/

      - name: Run GoReleaser (linux)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: ~> v1
          args: release --clean -f .goreleaser.linux.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          CGO_LDFLAGS: -L${{ github.workspace }}/cgo-lib/x86_64-unknown-linux-gnu

  release_macos:
    needs: [tag, release_linux_arm64]
    runs-on: macos-latest
    environment: goreleaser
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build coinset-inspect staticlib
        run: |
          MACOSX_DEPLOYMENT_TARGET=12.0 cargo build --release -p coinset-ffi --target aarch64-apple-darwin
          mkdir -p cgo-lib/aarch64-apple-darwin
          cp "target/aarch64-apple-darwin/release/libcoinset.a" cgo-lib/aarch64-apple-darwin/

      - name: Run GoReleaser (darwin)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: ~> v1
          args: release --clean -f .goreleaser.darwin.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          CGO_CFLAGS: -mmacosx-version-min=12.0
          CGO_LDFLAGS: -mmacosx-version-min=12.0 -L${{ github.workspace }}/cgo-lib/aarch64-apple-darwin
          MACOSX_DEPLOYMENT_TARGET: "12.0"

  release_windows:
    needs: [tag, release_macos]
    runs-on: windows-latest
    environment: goreleaser
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_version }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup MSYS2 (mingw64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\\msys64\\mingw64\\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Build coinset-inspect staticlib
        shell: msys2 {0}
        run: |
          cargo build --release -p coinset-ffi --target x86_64-pc-windows-gnu
          mkdir -p cgo-lib/x86_64-pc-windows-gnu
          cp "target/x86_64-pc-windows-gnu/release/libcoinset.a" cgo-lib/x86_64-pc-windows-gnu/

      - name: Run GoReleaser (windows)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: ~> v1
          args: release --clean -f .goreleaser.windows.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          CGO_LDFLAGS: -L${{ github.workspace }}/cgo-lib/x86_64-pc-windows-gnu
          CC: gcc

  release_linux_arm64:
    needs: [tag, release_linux]
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:20.04
    environment: goreleaser
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.new_version }}

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            build-essential \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Linux arm64 cross toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Build coinset-inspect staticlib (arm64)
        run: |
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc \
            cargo build --release -p coinset-ffi --target aarch64-unknown-linux-gnu
          mkdir -p cgo-lib/aarch64-unknown-linux-gnu
          cp "target/aarch64-unknown-linux-gnu/release/libcoinset.a" cgo-lib/aarch64-unknown-linux-gnu/

      - name: Run GoReleaser (linux arm64)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: ~> v1
          args: release --clean -f .goreleaser.linux.arm64.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          CC: aarch64-linux-gnu-gcc

  update_homebrew_tap:
    name: Update Homebrew tap
    needs: [tag, release_linux, release_linux_arm64, release_macos, release_windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download release archives
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "$TAG" --repo coinset-org/cli -p "coinset_*.tar.gz" -D assets
          ls -la assets

      - name: Compute sha256
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mac=(assets/coinset_Darwin_arm64.tar.gz)
          lin_amd=(assets/coinset_Linux_x86_64.tar.gz)
          lin_arm=(assets/coinset_Linux_arm64.tar.gz)

          if [ ${#mac[@]} -eq 0 ] || [ ${#lin_amd[@]} -eq 0 ]; then
            echo "missing required assets (need Darwin_arm64 + Linux_x86_64)" >&2
            exit 1
          fi

          mac_sha=$(sha256sum "${mac[0]}" | awk '{print $1}')
          lin_amd_sha=$(sha256sum "${lin_amd[0]}" | awk '{print $1}')

          echo "mac_sha=$mac_sha" >> "$GITHUB_OUTPUT"
          echo "lin_amd_sha=$lin_amd_sha" >> "$GITHUB_OUTPUT"

          if [ ${#lin_arm[@]} -ne 0 ]; then
            lin_arm_sha=$(sha256sum "${lin_arm[0]}" | awk '{print $1}')
            echo "lin_arm_sha=$lin_arm_sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh repo clone coinset-org/homebrew-cli tap

      - name: Update formula
        shell: bash
        env:
          TAG: ${{ needs.tag.outputs.new_version }}
          MAC_SHA: ${{ steps.sha.outputs.mac_sha }}
          LINUX_AMD_SHA: ${{ steps.sha.outputs.lin_amd_sha }}
          LINUX_ARM_SHA: ${{ steps.sha.outputs.lin_arm_sha }}
        run: |
          set -euo pipefail
          cd tap
          git fetch origin main
          git checkout -B main origin/main

          TAG="$TAG" MAC_SHA="$MAC_SHA" LINUX_AMD_SHA="$LINUX_AMD_SHA" LINUX_ARM_SHA="${LINUX_ARM_SHA:-}" \
            python3 - <<'PY'
          import os
          
          tag = os.environ["TAG"]
          ver = tag[1:] if tag.startswith("v") else tag
          mac_sha = os.environ["MAC_SHA"]
          linux_amd_sha = os.environ["LINUX_AMD_SHA"]
          linux_arm_sha = os.environ.get("LINUX_ARM_SHA") or ""
          
          install_block_mac = """      def install
            bin.install "coinset" => "coinset"
            output = Utils.popen_read("SHELL=bash #{bin}/coinset completion bash")
            (bash_completion/"coinset").write output
            output = Utils.popen_read("SHELL=zsh #{bin}/coinset completion zsh")
            (zsh_completion/"_coinset").write output
            prefix.install_metafiles
          end"""
          
          install_block_linux = """        def install
              bin.install "coinset" => "coinset"
              output = Utils.popen_read("SHELL=bash #{bin}/coinset completion bash")
              (bash_completion/"coinset").write output
              output = Utils.popen_read("SHELL=zsh #{bin}/coinset completion zsh")
              (zsh_completion/"_coinset").write output
              prefix.install_metafiles
            end"""
          
          linux_arm_block = ""
          if linux_arm_sha.strip():
              linux_arm_block = f"""
              on_arm do
                if Hardware::CPU.is_64_bit?
                  url "https://github.com/coinset-org/cli/releases/download/{tag}/coinset_Linux_arm64.tar.gz"
                  sha256 "{linux_arm_sha}"
          
          {install_block_linux}
                end
              end"""
          
          formula = f"""# typed: false
          # frozen_string_literal: true
          #
          # This file was generated by GoReleaser. DO NOT EDIT.
          class Coinset < Formula
            desc "CLI for accessing the Chia blockchain."
            homepage "https://www.coinset.org/"
            version "{ver}"
            license "MIT"
          
            on_macos do
              on_arm do
                url "https://github.com/coinset-org/cli/releases/download/{tag}/coinset_Darwin_arm64.tar.gz"
                sha256 "{mac_sha}"
          
          {install_block_mac}
              end
            end
          
            on_linux do
              on_intel do
                if Hardware::CPU.is_64_bit?
                  url "https://github.com/coinset-org/cli/releases/download/{tag}/coinset_Linux_x86_64.tar.gz"
                  sha256 "{linux_amd_sha}"
          
          {install_block_linux}
                end
              end{linux_arm_block}
            end
          end
          """
          
          with open("coinset.rb", "w", encoding="utf-8") as f:
              f.write(formula)
          PY

      - name: Commit and push formula update
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_GITHUB_TOKEN }}
          TAG: ${{ needs.tag.outputs.new_version }}
        run: |
          set -euo pipefail
          cd tap
          if git diff --quiet; then
            echo "No formula changes to commit."
            exit 0
          fi
          ver="${TAG#v}"
          git add coinset.rb
          git -c user.name="coinset-bot" -c user.email="actions@users.noreply.github.com" \
            commit -m "Brew formula update for coinset version v${ver}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/coinset-org/homebrew-cli.git"
          git push origin main
