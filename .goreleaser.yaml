# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# NOTE: CGO + Rust staticlib builds are runner-specific.
# In CI we run GoReleaser with one of:
# - `.goreleaser.linux.yaml`
# - `.goreleaser.darwin.yaml`
# - `.goreleaser.windows.yaml`
# This default config is kept runnable locally and targets Linux only.

version: 1

project_name: coinset

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: coinset-linux
    main: ./cmd/coinset
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - SKILL.md

checksum:
  name_template: >-
    {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}_checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: coinset-org
    name: cli

